spring:
  application:
    name: LarderMind

  # ── PostgreSQL ──
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL_MODE:require}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── Application Properties ──
app:
  jwt-secret: ${JWT_SECRET}
  frontend-url: ${FRONTEND_URL}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  # Optional — when set, preferred for recipe stock photos; otherwise Openverse is used
  unsplash:
    access-key: ${UNSPLASH_ACCESS_KEY:}
  llm:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    model: ${LLM_MODEL:deepseek-v4-flash}
    temperature: ${LLM_TEMPERATURE:0.4}
    # Tool-call JSON needs headroom; truncation causes JsonEOFException mid-args
    max-tokens: ${LLM_MAX_TOKENS:4096}
  auth0:
    # Optional — leave empty if not using Auth0 login
    domain: ${AUTH0_DOMAIN:}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      model-name: ${app.llm.model:deepseek-v4-flash}
      temperature: ${app.llm.temperature:0.4}
      max-tokens: ${app.llm.max-tokens:4096}
      timeout: 30s
    streaming-chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      model-name: ${app.llm.model:deepseek-v4-flash}
      temperature: ${app.llm.temperature:0.4}
      max-tokens: ${app.llm.max-tokens:4096}
      timeout: 300s

server:
  port: ${PORT:8080}
  # Force UTF-8 for all servlet I/O (do not rely on Windows MS950 / Big5 default)
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
