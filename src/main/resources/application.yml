spring:
  application:
    name: Cook-Planner

  # ── PostgreSQL ──
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── Application Properties ──
app:
  jwt-secret: ${JWT_SECRET}
  frontend-url: ${FRONTEND_URL}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  llm:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    model: ${LLM_MODEL:deepseek-v4-flash}
    temperature: ${LLM_TEMPERATURE:0.6}
    max-tokens: ${LLM_MAX_TOKENS:1000}
  auth0:
    domain: ${AUTH0_DOMAIN}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      model-name: ${app.llm.model:deepseek-v4-flash}
      temperature: ${app.llm.temperature:0.6}
      max-tokens: ${app.llm.max-tokens:1000}
      timeout: 30s
    streaming-chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      model-name: ${app.llm.model:deepseek-v4-flash}
      temperature: ${app.llm.temperature:0.6}
      max-tokens: ${app.llm.max-tokens:1000}
      timeout: 300s

server:
  port: ${PORT}
